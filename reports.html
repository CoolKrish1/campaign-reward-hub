<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Reports</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">import {init,requireLogin,shell,submissions,clickLogs,money} from './app.js';
function row(r,type){return `<tr><td>${new Date(r.time||r.createdAt||Date.now()).toLocaleString()}</td><td>${r.clickId||r.id||'-'}</td><td>${r.campaignTitle||r.campaignId||r.campaign||'-'}</td><td>${r.goalName||'BASE'}</td><td>₹${money(r.reward||r.payout||0)}</td><td><span class="status ${r.status||type}">${r.status||type}</span></td><td>${r.source||'campaign'}</td><td>${r.upi?String(r.upi).slice(0,4)+'***':'-'}</td></tr>`}
window.renderPage=()=>{if(!requireLogin())return;let all=[...submissions.map(x=>({...x,type:'pending'})),...clickLogs.map(x=>({...x,type:'clicked'}))];shell('reports',`<div class="toolbar"><button type="button" class="btn light" onclick="filterReport('all')">📊 All Reports ${all.length}</button><button type="button" class="btn green" onclick="filterReport('approved')">🎯 Approved ${submissions.filter(x=>x.status==='approved').length}</button><button type="button" class="btn orange" onclick="filterReport('pending')">⏳ Pending ${submissions.filter(x=>(x.status||'pending')==='pending').length}</button></div><div class="panel"><div class="toolbar"><h2 style="margin:0">Tracking History</h2><input id="q" class="field" style="max-width:360px" placeholder="Search offer" oninput="filterReport(currentFilter)"><select id="dateFilter" class="field" style="max-width:200px" onchange="filterReport(currentFilter)"><option value="">All Dates</option><option value="today">Today</option><option value="yesterday">Yesterday</option></select></div></div><div class="tablewrap"><table class="table"><thead><tr><th>Time</th><th>Click ID</th><th>Offer Name</th><th>Event</th><th>Payout</th><th>Status</th><th>Source</th><th>P1 Worker</th></tr></thead><tbody id="rows">${all.map(x=>row(x,x.type)).join('')||'<tr><td colspan="8" style="text-align:center;padding:50px">No Records Found</td></tr>'}</tbody></table></div>`);window._reports=all};
window.currentFilter='all';window.filterReport=(f='all')=>{window.currentFilter=f;let q=(document.getElementById('q')?.value||'').toLowerCase();let arr=(window._reports||[]).filter(x=>f==='all'||(x.status||x.type)===f).filter(x=>(x.campaignTitle||x.campaignId||x.campaign||'').toLowerCase().includes(q));document.getElementById('rows').innerHTML=arr.map(x=>row(x,x.type)).join('')||'<tr><td colspan="8" style="text-align:center;padding:50px">No Records Found</td></tr>'};init();</script></body></html>
