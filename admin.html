<!DOCTYPE html>
<html>
<head>
<title>Admin Panel FULL</title>
</head>

<body>
<h1>Admin Panel</h1>

<div id="withdrawals"></div>
<div id="users"></div>
<div id="reports"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
increment,
addDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* LOAD WITHDRAWALS */
async function loadWithdrawals(){

const snap = await getDocs(collection(db,"withdrawals"));

let html="";

snap.forEach(d=>{
let w=d.data();

html += `
<div style="border:1px solid red;padding:10px;margin:10px;">
<p>User: ${w.userId}</p>
<p>Amount: ₹${w.amount}</p>
<p>Status: ${w.status}</p>

<button onclick="approve('${d.id}','${w.userId}',${w.amount})">Approve</button>
<button onclick="reject('${d.id}')">Reject</button>
</div>
`;
});

document.getElementById("withdrawals").innerHTML = html;
}

/* APPROVE (AUTO BALANCE CUT + REPORT ADD) */
window.approve = async function(id,userId,amount){

await updateDoc(doc(db,"withdrawals",id),{
status:"approved"
});

await updateDoc(doc(db,"users",userId),{
balance: increment(-amount)
});

await addDoc(collection(db,"reports"),{
type:"WITHDRAW_APPROVED",
userId,
amount,
time:Date.now()
});

alert("Approved + Balance Deducted");
loadWithdrawals();
};

/* REJECT */
window.reject = async function(id){

await updateDoc(doc(db,"withdrawals",id),{
status:"rejected"
});

await addDoc(collection(db,"reports"),{
type:"WITHDRAW_REJECTED",
withdrawId:id,
time:Date.now()
});

alert("Rejected");
loadWithdrawals();
};

/* USERS */
async function loadUsers(){

const snap = await getDocs(collection(db,"users"));

let html="";

snap.forEach(d=>{
html += `<div>${d.id}</div>`;
});

document.getElementById("users").innerHTML = html;
}

/* REPORTS */
async function loadReports(){

const snap = await getDocs(collection(db,"reports"));

let html="";

snap.forEach(d=>{
let r=d.data();

html += `
<div style="border:1px solid blue;padding:10px;margin:10px;">
<p>${r.type}</p>
<p>${r.userId || ""}</p>
<p>${r.amount || ""}</p>
</div>
`;
});

document.getElementById("reports").innerHTML = html;
}

/* INIT */
loadWithdrawals();
loadUsers();
loadReports();

</script>
</body>
</html>
