<!DOCTYPE html>
<html>
<head>
<title>Pro Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0f172a;
color:white;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#111827;
padding:20px;
height:100vh;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
cursor:pointer;
border-radius:8px;
background:#1f2937;
color:white;
transition:0.3s;
}

.sidebar button:hover{
background:#38bdf8;
color:black;
}

/* MAIN */
.main{
flex:1;
padding:20px;
overflow:auto;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.card h3{
margin:0;
color:#38bdf8;
}

/* SECTION */
.section{
margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:12px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>⚡ Admin Panel</h2>

<button onclick="show('dashboard')">📊 Dashboard</button>
<button onclick="show('withdraw')">💰 Withdraw</button>
<button onclick="show('users')">👤 Users</button>
<button onclick="show('campaigns')">📦 Campaigns</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">

<div class="grid">
<div class="card">
<h3>Total Users</h3>
<p id="usersCount">0</p>
</div>

<div class="card">
<h3>Total Withdraw</h3>
<p id="withdrawCount">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingCount">0</p>
</div>

<div class="card">
<h3>Total Payout</h3>
<p id="payoutCount">0</p>
</div>
</div>

<div class="section">
<h3>📈 Analytics</h3>
<canvas id="chart"></canvas>
</div>

</div>

<!-- WITHDRAW -->
<div id="withdraw" style="display:none;">
<h2>Withdraw Requests</h2>
<div id="withdrawList"></div>
</div>

<!-- USERS -->
<div id="users" style="display:none;">
<h2>Users</h2>
<div id="userList"></div>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" style="display:none;">
<h2>Campaigns</h2>
<div id="campaignList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
collection,
getDocs,
doc,
updateDoc,
getDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyD...",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.firebasestorage.app",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

//
// NAVIGATION
//
window.show = function(page){
document.querySelectorAll(".main > div").forEach(d=>{
d.style.display="none";
});
document.getElementById(page).style.display="block";
};

//
// LOAD DASHBOARD STATS
//
async function loadStats(){

const users = await getDocs(collection(db,"wallets"));
const withdraw = await getDocs(collection(db,"withdrawals"));

let pending=0;
let payout=0;

withdraw.forEach(d=>{
const data=d.data();

if(data.status==="pending") pending++;
if(data.status==="approved") payout += Number(data.amount);
});

document.getElementById("usersCount").innerText = users.size;
document.getElementById("withdrawCount").innerText = withdraw.size;
document.getElementById("pendingCount").innerText = pending;
document.getElementById("payoutCount").innerText = payout;

loadChart(pending,payout);
}

//
// CHART
//
function loadChart(pending,payout){

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Pending","Payout"],
datasets:[{
label:"Stats",
data:[pending,payout],
backgroundColor:["orange","green"]
}]
}
});
}

//
// WITHDRAW LIST
//
async function loadWithdraw(){

const snap = await getDocs(collection(db,"withdrawals"));

let html="";

snap.forEach(d=>{

const data=d.data();

html+=`
<div class="card">
<p>User: ${data.userId}</p>
<p>Amount: ₹${data.amount}</p>
<p>Status: ${data.status}</p>

${data.status==="pending" ? `
<button onclick="approve('${d.id}')">Approve</button>
<button onclick="reject('${d.id}')">Reject</button>
`:""}
</div>
`;
});

document.getElementById("withdrawList").innerHTML=html;
}

//
// USERS
//
async function loadUsers(){

const snap = await getDocs(collection(db,"wallets"));

let html="";

snap.forEach(d=>{
html+=`
<div class="card">
User: ${d.id} <br>
Balance: ₹${d.data().balance}
</div>
`;
});

document.getElementById("userList").innerHTML=html;
}

//
// CAMPAIGNS
//
async function loadCampaigns(){

const snap = await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(d=>{
html+=`
<div class="card">
${d.data().title} - ₹${d.data().reward}
</div>
`;
});

document.getElementById("campaignList").innerHTML=html;
}

//
// APPROVE
//
window.approve=async function(id){

const ref=doc(db,"withdrawals",id);
const snap=await getDoc(ref);

const data=snap.data();

await updateDoc(ref,{status:"approved"});

await updateDoc(doc(db,"wallets",data.userId),{
balance:increment(-data.amount)
});

loadStats();
loadWithdraw();
};

//
// REJECT
//
window.reject=async function(id){

await updateDoc(doc(db,"withdrawals",id),{
status:"rejected"
});

loadStats();
loadWithdraw();
};

loadStats();
loadWithdraw();
loadUsers();
loadCampaigns();

</script>

</body>
</html>
