<!DOCTYPE html>
<html>
<body>

<h2>History</h2>

<div id="list"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

const q = query(collection(db,"withdrawals"),where("userId","==",user.uid));
const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
let x=d.data();
html += `<div>₹${x.amount} - ${x.status}</div>`;
});

document.getElementById("list").innerHTML = html || "No data";

});

</script>

</body>
</html>
