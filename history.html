<!DOCTYPE html>
<html>
<head>
<title>My Earnings</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.pending{ color:orange; }
.approved{ color:green; }
.rejected{ color:red; }
</style>
</head>

<body>

<h1>My Earnings & Withdraw History</h1>

<div id="list">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";
import {
getFirestore,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
 apiKey: "AIzaSyD...",
 authDomain: "effortless-earn-7f39e.firebaseapp.com",
 projectId: "effortless-earn-7f39e",
 storageBucket: "effortless-earn-7f39e.firebasestorage.app",
 messagingSenderId: "554178513766",
 appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;

onAuthStateChanged(auth, (u)=>{
  if(!u){
    window.location.href="signin.html";
    return;
  }

  user = u;
  loadData();
});

async function loadData(){

  const q = query(collection(db,"withdrawals"), where("userId","==",user.uid));
  const snap = await getDocs(q);

  let html="";

  snap.forEach(d=>{

    const data = d.data();

    let cls = data.status === "pending"
      ? "pending"
      : data.status === "approved"
      ? "approved"
      : "rejected";

    html += `
      <div class="card">
        <p><b>Amount:</b> ₹${data.amount}</p>
        <p><b>UPI:</b> ${data.upi}</p>
        <p><b>Status:</b> <span class="${cls}">${data.status}</span></p>
        <p><b>Date:</b> ${data.createdAt ? new Date(data.createdAt.seconds*1000).toLocaleString() : ""}</p>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html || "No records found";
}

</script>

</body>
</html>
