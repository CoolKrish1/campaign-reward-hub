<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111827;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
border-radius:20px;
width:350px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:12px;
border:1px solid #ddd;
border-radius:10px;
}

button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:10px;
}

a{
display:block;
margin-top:15px;
text-align:center;
}

</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input
id="email"
placeholder="Email"
>

<input
id="password"
type="password"
placeholder="Password"
>

<button
onclick="login()"
>

LOGIN

</button>

<a href="register.html">

Create Account

</a>

</div>

<script type="module">

import { auth }

from "./firebase.js";

import {

signInWithEmailAndPassword

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

window.login=
async()=>{

try{

await signInWithEmailAndPassword(

auth,

email.value,

password.value

);

alert(
"Login Success"
);

location.href=
"index.html";

}

catch(e){

alert(
e.message
);

}

}

</script>

</body>
</html>
