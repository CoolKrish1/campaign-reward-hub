<!DOCTYPE html>
<html>
<head>
<title>Tracking...</title>
</head>

<body>

<h2>
Tracking Click...
</h2>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";

import {
getFirestore,
collection,
query,
where,
getDocs,
addDoc
}
from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain:"effortless-earn-7f39e.firebaseapp.com",
projectId:"effortless-earn-7f39e",
storageBucket:"effortless-earn-7f39e.appspot.com",
messagingSenderId:"554178513766",
appId:"1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app=initializeApp(firebaseConfig);

const db=getFirestore(app);

const params =
new URLSearchParams(
window.location.search
);

const slug =
params.get("slug");

if(!slug){

document.body.innerHTML=
"Invalid Link";

throw "";

}

const q=query(
collection(db,"smart_links"),
where(
"slug",
"==",
slug
)
);

const snap =
await getDocs(q);

if(snap.empty){

document.body.innerHTML=
"Offer not found";

throw "";

}

let data=null;

snap.forEach(d=>{
data=d.data();
});

const clickId =
Math.random()
.toString(36)
.slice(2,10);

await addDoc(
collection(db,"click_logs"),
{
slug:slug,
trackingId:clickId,
publisherId:data.publisherId,
campaignId:data.campaignId,
time:Date.now()
}
);

let finalLink =
data.offerLink || "";

finalLink =
finalLink.replace(
"{trackingId}",
clickId
);

window.location.href =
finalLink;

</script>

</body>
</html>
