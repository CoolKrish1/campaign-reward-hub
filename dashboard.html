<!DOCTYPE html>
<html>
<head>
<title>Dashboard Pro</title>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

/* SIDEBAR */
.sidebar{
width:240px;
height:100vh;
background:#111827;
padding:20px;
position:fixed;
}

.sidebar h2{color:#38bdf8;}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.sidebar button:hover{
background:#38bdf8;
color:black;
}

/* MAIN */
.main{
margin-left:260px;
padding:20px;
width:100%;
}

/* SECTION */
.section{display:none;}
.active{display:block;}

/* CARD */
.card{
background:#111827;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #1f2937;
}

/* INPUT */
input{
padding:8px;
margin:5px 0;
width:200px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Dashboard</h2>

<button onclick="show('home')">Home</button>
<button onclick="show('campaigns')">Campaigns</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('history')">History</button>
<button onclick="show('reports')">Reports</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="home" class="section active">
<h2>Welcome</h2>
<h3>Balance: ₹<span id="balance">0</span></h3>
</div>

<!-- CAMPAIGNS -->
<div id="campaigns" class="section">
<h2>Campaigns</h2>
<div id="campaignList"></div>
</div>

<!-- WITHDRAW -->
<div id="withdraw" class="section">

<h2>Withdraw Money</h2>

<div class="card">
<p>Balance: ₹<span id="balance2">0</span></p>

<input id="upi" placeholder="UPI ID"><br>
<input id="amount" type="number" placeholder="Amount"><br>
<button onclick="withdraw()">Request Withdraw</button>
</div>

<div id="withdrawList"></div>

</div>

<!-- HISTORY -->
<div id="history" class="section">
<h2>History</h2>
<div id="historyList"></div>
</div>

<!-- REPORTS -->
<div id="reports" class="section">
<h2>Reports</h2>
<div id="reportList"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
collection,
getDocs,
addDoc,
query,
where
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser;

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

currentUser = user;

loadWallet();
loadCampaigns();
loadHistory();
loadReports();
loadWithdrawHistory();

});

/* WALLET */
async function loadWallet(){
const snap = await getDoc(doc(db,"users",currentUser.uid));
if(snap.exists()){
document.getElementById("balance").innerText = snap.data().balance || 0;
document.getElementById("balance2").innerText = snap.data().balance || 0;
}
}

/* CAMPAIGNS */
async function loadCampaigns(){
const snap = await getDocs(collection(db,"campaigns"));

let html="";

snap.forEach(d=>{
const c = d.data();

html += `
<div class="card">
<h3>${c.title}</h3>
<p>Reward: ₹${c.reward}</p>

<button onclick="apply('${d.id}','${c.title}',${c.reward})">
Apply
</button>

</div>
`;
});

document.getElementById("campaignList").innerHTML = html;
}

/* APPLY */
window.apply = async function(id,title,reward){

await addDoc(collection(db,"applications"),{
userId: currentUser.uid,
campaignId: id,
reward,
status:"pending",
time: Date.now()
});

/* REPORT */
await addDoc(collection(db,"reports"),{
userId: currentUser.uid,
offerName: title,
payout: reward,
status:"pending",
ip: "N/A",
worker: "P1",
trackingId: Math.random().toString(36).slice(2,10),
time: Date.now()
});

alert("Applied");
loadHistory();
loadReports();
};

/* WITHDRAW */
window.withdraw = async function(){

const upi = document.getElementById("upi").value;
const amount = Number(document.getElementById("amount").value);

const snap = await getDoc(doc(db,"users",currentUser.uid));
const balance = snap.data().balance || 0;

if(amount > balance){
alert("Insufficient Balance");
return;
}

await addDoc(collection(db,"withdrawals"),{
userId: currentUser.uid,
upi,
amount,
status:"pending",
time: Date.now()
});

/* REPORT */
await addDoc(collection(db,"reports"),{
userId: currentUser.uid,
offerName:"Withdraw Request",
payout:amount,
status:"pending",
ip:"N/A",
worker:"P1",
trackingId:Math.random().toString(36).slice(2,10),
time:Date.now()
});

alert("Withdraw Requested");

loadWithdrawHistory();
loadReports();
};

/* HISTORY */
async function loadHistory(){

const q = query(collection(db,"applications"),where("userId","==",currentUser.uid));

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const h=d.data();

html += `
<div class="card">
<p>Campaign: ${h.campaignId}</p>
<p>Reward: ₹${h.reward}</p>
<p>Status: ${h.status}</p>
</div>
`;
});

document.getElementById("historyList").innerHTML = html;
}

/* REPORTS */
async function loadReports(){

const snap = await getDocs(collection(db,"reports"));

let html="";

snap.forEach(d=>{
const r=d.data();

html += `
<div class="card">
<p>${r.offerName}</p>
<p>₹${r.payout}</p>
<p>${r.status}</p>
<p>${r.userId}</p>
<p>${r.worker}</p>
<p>${r.time}</p>
</div>
`;
});

document.getElementById("reportList").innerHTML = html;
}

/* WITHDRAW HISTORY */
async function loadWithdrawHistory(){

const q = query(collection(db,"withdrawals"),where("userId","==",currentUser.uid));

const snap = await getDocs(q);

let html="";

snap.forEach(d=>{
const w=d.data();

html += `
<div class="card">
<p>₹${w.amount}</p>
<p>${w.upi}</p>
<p>${w.status}</p>
</div>
`;
});

document.getElementById("withdrawList").innerHTML = html;
}

/* NAV */
window.show=function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* LOGOUT */
window.logout=function(){
signOut(auth);
window.location.href="login.html";
};

</script>

</body>
</html>
