<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
display:flex;
background:#0b1220;
color:white;
}

.sidebar{
width:240px;
background:#111827;
height:100vh;
padding:20px;
position:fixed;
}

.sidebar button{
width:100%;
padding:10px;
margin-top:10px;
background:#1f2937;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.main{
margin-left:260px;
padding:20px;
width:100%;
}

.section{display:none;}
.active{display:block;}

.card{
background:#1e293b;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>⚡ Dashboard</h2>
<button onclick="show('home')">Home</button>
<button onclick="logout()">Logout</button>
</div>

<div class="main">

<div id="home" class="section active">

<h2>Your Dashboard</h2>

<div class="card">
Balance: ₹<span id="balance">0</span>
</div>

<canvas id="chart"></canvas>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let ready = false;

/* AUTH FIX */
onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

const snap = await getDoc(doc(db,"wallets",user.uid));

if(snap.exists()){
document.getElementById("balance").innerText = snap.data().balance;
}

ready = true;

});

/* NAV */
window.show = function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* LOGOUT */
window.logout = function(){
signOut(auth);
window.location.href="login.html";
};

</script>

</body>
</html>
