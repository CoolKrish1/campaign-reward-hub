<!DOCTYPE html>
<html>
<head>
<title>User Dashboard FIX</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
display:flex;
}

/* SIDEBAR */
.sidebar{
width:220px;
height:100vh;
background:#111827;
position:fixed;
padding:20px;
}

.sidebar h2{
color:#38bdf8;
}

.sidebar button{
width:100%;
padding:10px;
margin:8px 0;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#38bdf8;
color:black;
}

/* MAIN */
.main{
margin-left:240px;
padding:20px;
width:100%;
}

/* SECTIONS */
.section{
display:none;
}

.active{
display:block;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:12px;
}

.item{
background:#1e293b;
padding:10px;
margin:8px 0;
border-radius:10px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>⚡ Dashboard</h2>

<button onclick="show('home')">Home</button>
<button onclick="show('wallet')">Wallet</button>
<button onclick="show('withdraw')">Withdraw</button>
<button onclick="show('campaigns')">Campaigns</button>
<button onclick="logout()">Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<div id="home" class="section active">
<h2>Dashboard Home</h2>

<div class="cards">
<div class="card">Balance <h2 id="balance">₹0</h2></div>
<div class="card">Withdraw <h2 id="withdrawCount">0</h2></div>
<div class="card">Pending <h2 id="pendingCount">0</h2></div>
</div>

<canvas id="chart"></canvas>
</div>

<div id="wallet" class="section">
<h2>Wallet</h2>
<div class="item" id="walletInfo">Loading...</div>
</div>

<div id="withdraw" class="section">
<h2>Withdraw History</h2>
<div id="withdrawList">Loading...</div>
</div>

<div id="campaigns" class="section">
<h2>Campaigns</h2>
<div id="campaignList">Loading...</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
getFirestore,
doc,
getDoc,
collection,
query,
where,
getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

import {
getAuth,
onAuthStateChanged,
signOut
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

/* FIREBASE */
const firebaseConfig = {
apiKey: "AIzaSyDxdJ6f2WtbfIzjBjQDybxCSYYYEkTgc0E",
authDomain: "effortless-earn-7f39e.firebaseapp.com",
projectId: "effortless-earn-7f39e",
storageBucket: "effortless-earn-7f39e.appspot.com",
messagingSenderId: "554178513766",
appId: "1:554178513766:web:d8d7edf915a95349cb16a7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

/* NAV FIX */
window.show = function(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
};

/* AUTH */
onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="login.html";
return;
}

load(user.uid);

});

/* MAIN LOAD */
async function load(uid){

/* WALLET */
const walletSnap = await getDoc(doc(db,"wallets",uid));

let balance = walletSnap.exists() ? (walletSnap.data().balance || 0) : 0;

document.getElementById("balance").innerText = "₹"+balance;
document.getElementById("walletInfo").innerText =
`User: ${uid} | Balance: ₹${balance}`;

/* WITHDRAW */
const q = query(collection(db,"withdrawals"), where("userId","==",uid));
const snap = await getDocs(q);

let pending = 0;
let html = "";

snap.forEach(d=>{
let x = d.data();
if(x.status==="pending") pending++;

html += `<div class="item">₹${x.amount} - ${x.status}</div>`;
});

document.getElementById("withdrawList").innerHTML = html || "No data";
document.getElementById("withdrawCount").innerText = snap.size;
document.getElementById("pendingCount").innerText = pending;

/* CAMPAIGNS (IMPORTANT FIX) */
const campSnap = await getDocs(collection(db,"campaigns"));

let chtml = "";
campSnap.forEach(d=>{
chtml += `<div class="item">${d.data().title || "No title"}</div>`;
});

document.getElementById("campaignList").innerHTML = chtml || "No campaigns";

/* CHART SAFE */
new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["Balance","Withdraw","Pending"],
datasets:[{
data:[balance,snap.size,pending],
backgroundColor:["#38bdf8","#60a5fa","#facc15"]
}]
}
});

}

/* LOGOUT */
window.logout = function(){
signOut(auth);
window.location.href="login.html";
};

</script>

</body>
</html>
