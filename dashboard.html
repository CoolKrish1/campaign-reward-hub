<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Effortless Earn</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f7fb;
}

.top{
background:#111;
padding:20px;
color:white;
}

.grid{
display:grid;

grid-template-columns:
repeat(
auto-fit,
minmax(
300px,
1fr
)
);

gap:20px;

padding:20px;
}

.card{
background:white;

border-radius:20px;

overflow:hidden;

box-shadow:
0 5px 20px
rgba(
0,0,0,.1
);

}

.card img{
width:100%;

height:200px;

object-fit:cover;
}

.box{
padding:15px;
}

.reward{
color:green;

font-size:24px;

font-weight:bold;
}

button{

width:100%;

padding:14px;

background:#111;

color:white;

border:none;

border-radius:10px;

margin-top:10px;

}

.modal{

position:fixed;

top:0;

left:0;

width:100%;

height:100%;

background:
rgba(
0,0,0,.7
);

display:none;

justify-content:center;

align-items:center;

padding:20px;

}

.modalBox{

background:white;

padding:20px;

border-radius:20px;

width:100%;

max-width:700px;

}

.modalBox img{

width:100%;

height:250px;

object-fit:cover;

border-radius:15px;

}

input,
textarea{

width:100%;

padding:12px;

margin-top:10px;

border:1px solid #ddd;

border-radius:10px;

}

</style>

</head>

<body>

<div class="top">

<h2>

Effortless Earn

</h2>

</div>

<div
id="campaigns"
class="grid">

</div>

<div
id="modal"
class="modal">

<div
class="modalBox">

<div
id="details">

</div>

</div>

</div>

<script type="module">

import {
db,
storage
}

from "./firebase.js";

import {

collection,

getDocs,

addDoc

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {

ref,

uploadBytes,

getDownloadURL

}

from

"https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

let all=[];

async function load(){

const snap=

await getDocs(
collection(
db,
"campaigns"
)
);

all=[];

snap.forEach(doc=>{

all.push({

id:doc.id,

...doc.data()

});

});

render();

}

function render(){

let html="";

all.forEach(d=>{

html+=`

<div class="card">

<img src="${d.image}">

<div class="box">

<h3>

${d.title}

</h3>

<p>

${d.category}

</p>

<div class="reward">

₹${d.reward}

</div>

<button

onclick="
openTask(
'${d.id}'
)
">

START TASK

</button>

</div>

</div>

`;

});

document.getElementById(
"campaigns"
).innerHTML=
html;

}

window.openTask=(id)=>{

let d=

all.find(
x=>x.id==id
);

document
.getElementById(
"modal"
)

.style.display=
"flex";

document
.getElementById(
"details"
)

.innerHTML=

`

<img src="${d.image}">

<h2>

${d.title}

</h2>

<h3>

Reward ₹${d.reward}

</h3>

<p>

${d.steps}

</p>

<input
id="upi"
placeholder="UPI ID"
>

<input
type="file"
id="proof"
>

<textarea
id="note"
placeholder="
Note
">
</textarea>

<button
onclick="
submitTask(
'${d.id}'
)
">

SUBMIT

</button>

`;

}

window.submitTask=
async(id)=>{

let upi=
document
.getElementById(
"upi"
).value;

let note=
document
.getElementById(
"note"
).value;

let file=
document
.getElementById(
"proof"
)

.files[0];

let proof="";

if(file){

let r=

ref(
storage,
"proof/"+Date.now()
);

await uploadBytes(
r,file
);

proof=

await getDownloadURL(
r
);

}

await addDoc(

collection(
db,
"submissions"
),

{

campaign:id,

upi,

note,

proof,

status:"pending",

time:Date.now()

}

);

alert(
"Submitted"
);

location.reload();

}

load();

</script>

</body>

</html>
