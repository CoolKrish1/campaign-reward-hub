<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow"><title>My Tracker</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><script type="module">
import {db} from './firebase.js';
import {collection,getDocs,query,where,limit} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const safe=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const money=n=>Number(n||0).toLocaleString('en-IN');
const compactDate=(value)=>{try{if(!value)return '-';let d;if(value?.toDate)d=value.toDate();else if(value?.seconds)d=new Date(value.seconds*1000);else if(typeof value==='number')d=new Date(value<10000000000?value*1000:value);else d=new Date(value);return isNaN(d)?'-':d.toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}catch(_){return '-'}};
const PLACEHOLDER='data:image/svg+xml;utf8,'+encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120"><rect width="120" height="120" rx="24" fill="#eef4ff"/><text x="60" y="68" font-size="14" font-family="Arial" fill="#2f6df6" text-anchor="middle" font-weight="700">OFFER</text></svg>`);
const img=d=>String(d?.image||d?.imageUrl||d?.logo||'').trim()||PLACEHOLDER;
const qs=new URLSearchParams(location.search);
const pathParts=location.pathname.split('/').filter(Boolean);
const pathSlug=(pathParts[0]==='track' && pathParts[1]) ? decodeURIComponent(pathParts[1]) : '';
let currentSlug=qs.get('slug') || pathSlug || '';
let currentPub=qs.get('pub') || '';
let cache={links:[],camps:[],clicks:[],leads:[]};
async function getCol(name){try{return (await getDocs(collection(db,name))).docs.map(d=>({id:d.id,...d.data()}))}catch(e){console.warn(name,e.message);return []}}
function statusBadge(s){s=String(s||'clicked').toLowerCase();return `<span class="status ${safe(s)}">${safe(s)}</span>`}
function dateOk(t,range){if(range==='all')return true;let time=Number(t||0); if(!time)return true; if(time<10000000000)time*=1000; const d=new Date(time); const now=new Date(); const start=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime(); if(range==='today')return time>=start; if(range==='yesterday')return time>=start-86400000 && time<start; if(range==='7days')return time>=Date.now()-7*86400000; return true;}
function mask(v){v=String(v||''); if(v.length<5)return v||'-'; return v.slice(0,3)+'***'+v.slice(-3)}
function getSelectedLink(){return cache.links.find(x=>String(x.slug||x.id)===currentSlug && (!currentPub || x.publisherId===currentPub)) || cache.links.find(x=>String(x.slug||x.id)===currentSlug) || cache.links[0] || null}
function offerTitle(link){const camp=cache.camps.find(c=>c.id===link?.campaignId)||{};return link?.campaignTitle||camp.title||'Campaign'}
function renderShell(){
 const link=getSelectedLink();
 const selected=link?String(link.slug||link.id):currentSlug;
 const options=['<option value="all">🎯 All Offers</option>'].concat(cache.links.map(l=>`<option value="${safe(l.slug||l.id)}" ${String(l.slug||l.id)===selected?'selected':''}>${safe(offerTitle(l))}</option>`)).join('');
 document.getElementById('root').innerHTML=`<main class="tracker-pro"><section class="tracker-wrap"><h1>MY TRACKER</h1><p class="muted big-space">CHECK GOALS & PAYMENTS</p><div class="tracker-box"><label>Your UPI ID / Bank A/C No</label><input id="trackUpi" class="track-input" placeholder="Ex: upi@okicici or 1234567890" value="${safe(localStorage.getItem('trackUpi')||'')}"><div class="track-filter-row"><select id="trackRange" class="track-select"><option value="all">ALL</option><option value="today">TODAY</option><option value="yesterday">YESTERDAY</option><option value="7days">7 DAYS</option></select><select id="trackOffer" class="track-select">${options}</select></div><button type="button" class="btn full track-btn" onclick="runTrack()">⚡ Track Report</button></div><div id="trackResult"></div></section></main>`;
 if(currentSlug){document.getElementById('trackOffer').value=selected||'all'}
}
window.runTrack=()=>{
 const upi=(document.getElementById('trackUpi')?.value||'').trim();
 const range=document.getElementById('trackRange')?.value||'all';
 const chosen=document.getElementById('trackOffer')?.value||'all';
 localStorage.setItem('trackUpi',upi);
 currentSlug=chosen==='all'?'':chosen;
 let links=chosen==='all'?cache.links:cache.links.filter(l=>String(l.slug||l.id)===chosen);
 const smartIds=new Set(links.map(l=>l.id)); const slugs=new Set(links.map(l=>String(l.slug||l.id)));
 let clicks=cache.clicks.filter(x=>(!links.length || smartIds.has(x.smartId) || slugs.has(String(x.slug))) && dateOk(x.time||x.createdAt,range));
 let leads=cache.leads.filter(x=>(!links.length || smartIds.has(x.smartId) || slugs.has(String(x.slug))) && dateOk(x.time||x.createdAt,range));
 if(upi){const u=upi.toLowerCase(); clicks=clicks.filter(x=>String(x.upi||x.p1||x.worker||'').toLowerCase().includes(u)); leads=leads.filter(x=>String(x.upi||x.p1||x.worker||'').toLowerCase().includes(u));}
 const approved=leads.filter(x=>String(x.status||'').toLowerCase()==='approved');
 const pending=leads.filter(x=>String(x.status||'pending').toLowerCase()==='pending');
 const reward=approved.reduce((a,x)=>a+Number(x.reward||x.payout||0),0);
 const rows=leads.length?leads.sort((a,b)=>(b.time||b.createdAt||0)-(a.time||a.createdAt||0)).slice(0,40).map(x=>`<div class="track-result-row"><div><b>${safe(x.campaignTitle||x.offerName||'Offer')}</b><small>${safe(x.goalName||x.event||'BASE')} • ${compactDate(x.time||x.createdAt)} • ${mask(x.upi)}</small></div><div class="track-amount"><b>${Number(x.reward||x.payout||0)?'₹'+money(x.reward||x.payout):'-'}</b>${statusBadge(x.status||'pending')}</div></div>`).join(''):'<div class="empty small">No report found. Check UPI/date/offer and try again.</div>';
 document.getElementById('trackResult').innerHTML=`<div class="tracker-summary"><div><span>Clicks</span><b>${clicks.length}</b></div><div><span>Pending</span><b>${pending.length}</b></div><div><span>Approved</span><b>₹${money(reward)}</b></div></div><div class="tracker-results"><h3>Tracking History</h3>${rows}</div>`;
};
async function init(){
 document.getElementById('root').innerHTML='<main class="tracker-pro"><section class="tracker-wrap"><div class="tracker-box"><h2>Loading tracker...</h2></div></section></main>';
 const [links,camps,clicks,leads,subs]=await Promise.all([getCol('smart_links'),getCol('campaigns'),getCol('click_logs'),getCol('lead_submissions'),getCol('submissions')]);
 cache={links,camps,clicks,leads:[...leads,...subs]};
 renderShell();
 if(currentSlug) runTrack();
}
init();
</script></body></html>
