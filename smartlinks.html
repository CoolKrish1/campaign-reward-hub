<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,campaigns,smartLinks,loadData,user,getGoals,money,totalMax,toast,modal} from './app.js';
import {db} from './firebase.js';
import {collection,addDoc,doc,deleteDoc,updateDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
let selected=new URLSearchParams(location.search).get('campaign')||'';
const safe=v=>String(v??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
function activeCampaigns(){return campaigns.filter(x=>x.status!=='paused')}
function base(){return location.origin+location.pathname.replace(/[^/]*$/,'')}
function linkOf(l){return base()+'campaign.html?id='+(l.campaignId||'')+'&slug='+(l.slug||l.id)+'&pub='+(l.publisherId||user.uid)}
function renderCard(l){const link=linkOf(l);return `<div class="smart-card" id="smart_${l.id}"><div class="smart-card-head"><div><h2>${safe(l.campaignTitle||l.campaignId||'Smart Campaign')}</h2><p class="muted">${safe(l.slug||l.id)}</p></div><div class="actions"><button type="button" class="iconbtn" onclick="editSmart('${l.id}')">✎</button><button type="button" class="iconbtn danger" onclick="delSmart('${l.id}')">🗑</button></div></div><div class="smart-links"><div class="smart-link blueSoft"><b>Worker Link (P1)</b><div class="toolbar"><input class="field" value="${link}" readonly><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');toast('Link copied')">Copy</button></div></div><div class="smart-link yellowSoft"><b>Tracking Status</b><div class="toolbar"><input class="field" value="${link}" readonly><button type="button" class="btn yellow" onclick="navigator.clipboard.writeText('${link}');toast('Link copied')">Copy</button></div></div></div></div>`}
function renderRows(list){return list.map(renderCard).join('')||'<div class="empty">No smart campaign yet.</div>'}
window.renderPage=()=>{if(!requireLogin())return;const pre=campaigns.find(x=>x.id===selected)||null;const rows=pre?smartLinks.filter(l=>l.campaignId===pre.id):smartLinks;shell('smart',`<div class="panel page-title"><div><h2>My Smart Campaigns</h2><p class="muted">Create P1/P2 links and payout split.</p></div><button type="button" class="btn" onclick="openBuilder('${pre?.id||''}')">＋ Create New</button></div>${pre?`<div class="selected-offer-mini"><img src="${safe(pre.image||'')}"><div><b>${safe(pre.title||'Campaign')}</b><small>Max ₹${money(totalMax(pre))}</small></div><span class="tag green">Selected</span></div>`:''}<div class="smart-list">${renderRows(rows)}</div>`)};
function offerSelectHtml(current=''){return `<label class="mini">Select Offer</label><select id="offerSel" class="field" onchange="offerChanged()">${current?'':'<option value="">-- Choose Offer --</option>'}${activeCampaigns().map(c=>`<option value="${c.id}" ${c.id===current?'selected':''}>${safe(c.title||'Campaign')}</option>`).join('')}</select>`}
function goalHtml(c,l=null){const goals=(l?.goals?.length?l.goals:getGoals(c));return `<label class="mini">Campaign Title</label><input id="title" class="field" value="${safe(l?.campaignTitle||c.title||'')}"><label class="mini">Custom Slug</label><input id="slug" class="field" value="${safe(l?.slug||'')}" placeholder="${safe((c.title||'offer').toLowerCase().replace(/[^a-z0-9]+/g,'-'))}"><div class="goal-panel smart-compact"><div class="toolbar"><b>Payout Calculator</b><label class="ref-toggle"><input type="checkbox" id="p2" ${l?.enableP2?'checked':''}> P2</label></div>${goals.map((g,i)=>`<div class="goalbox"><h3>${safe(g.name)} <span class="tag">Max ₹${money(g.maxPayout)}</span></h3><label class="mini">Worker Payout</label><input class="field split" data-max="${g.maxPayout}" data-name="${safe(g.name)}" value="${g.userReward||0}" type="number" min="0" max="${g.maxPayout}" oninput="calcProfit(this)"><div class="profitline">Profit ₹<span>${money(Math.max(0,Number(g.maxPayout||0)-Number(g.userReward||0)))}</span></div></div>`).join('')}</div><label class="mini">Worker Steps</label><textarea id="steps" class="field" rows="3">${safe(l?.steps||c.instructions||c.steps||'')}</textarea><button type="button" class="btn full" onclick="saveSmart('${l?.id||''}')">${l?'Save Changes':'Create Campaign'}</button>`}
window.offerChanged=()=>{const c=campaigns.find(x=>x.id===document.getElementById('offerSel')?.value);document.getElementById('builderBody').innerHTML=c?goalHtml(c):'<div class="empty small">Select an offer to continue.</div>'};
window.openBuilder=(campaignId='', smartId='')=>{const l=smartLinks.find(x=>x.id===smartId)||null;const c=campaigns.find(x=>x.id===(campaignId||l?.campaignId));modal(`<h2>${l?'Edit':'New'} Campaign</h2>${offerSelectHtml(c?.id||'')}<div id="builderBody">${c?goalHtml(c,l):'<div class="empty small">Select an offer to continue.</div>'}</div>`)};
window.calcProfit=(el)=>{let max=Number(el.dataset.max||0), val=Math.min(max,Number(el.value||0)); if(Number(el.value)>max){el.value=max;val=max} el.closest('.goalbox').querySelector('.profitline span').textContent=money(Math.max(0,max-val))};
window.saveSmart=async(smartId='')=>{const campaignId=document.getElementById('offerSel')?.value;if(!campaignId){toast('Select offer');return}const c=campaigns.find(x=>x.id===campaignId)||{}; const gs=[...document.querySelectorAll('.split')].map((el,i)=>({id:'g'+i,name:el.dataset.name,maxPayout:Number(el.dataset.max||0),userReward:Number(el.value||0),affiliateProfit:Math.max(0,Number(el.dataset.max||0)-Number(el.value||0))})); const payload={campaignId,campaignTitle:document.getElementById('title')?.value||c.title||'',publisherId:user.uid,slug:(document.getElementById('slug')?.value||((document.getElementById('title')?.value||c.title||'offer').toLowerCase().replace(/[^a-z0-9]+/g,'-'))+'-'+Date.now().toString().slice(-4)),goals:gs,enableP2:document.getElementById('p2')?.checked||false,steps:document.getElementById('steps')?.value||'',updatedAt:Date.now()}; if(smartId){await updateDoc(doc(db,'smart_links',smartId),payload)}else{payload.createdAt=Date.now(); await addDoc(collection(db,'smart_links'),payload)} closeModal(); await loadData(); window.renderPage(); toast(smartId?'Updated':'Smart campaign created')};
window.editSmart=(id)=>{const l=smartLinks.find(x=>x.id===id);if(l)openBuilder(l.campaignId,id)};
window.delSmart=async(id)=>{if(!confirm('Delete smart campaign?'))return; await deleteDoc(doc(db,'smart_links',id)); await loadData(); window.renderPage(); toast('Deleted')};
init();</script></body></html>
