<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Smart Links</title><link rel="stylesheet" href="style.css"></head><body><div id="root"></div><div id="modal" class="modal"><div class="modalbox"><button type="button" class="close" onclick="closeModal()">×</button><div id="modalContent"></div></div></div><script type="module">
import {init,requireLogin,shell,campaigns,smartLinks,profile,isAdmin,loadData,user,getGoals,money,totalMax,toast,modal} from './app.js';
import {db} from './firebase.js';
import {collection,addDoc,doc,deleteDoc,updateDoc} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
let selected=new URLSearchParams(location.search).get('campaign')||'';
function base(){return location.origin+location.pathname.replace(/[^/]*$/,'')}
function renderRows(){return smartLinks.map(l=>{let link=base()+'campaign.html?id='+(l.campaignId||'')+'&slug='+(l.slug||l.id)+'&pub='+(l.publisherId||user.uid);return `<tr id="row_${l.id}"><td><b>${l.slug||l.id}</b><br><small>${l.campaignTitle||l.campaignId||'-'}</small></td><td><input class="field" value="${link}" readonly></td><td>₹${money((l.goals||[]).reduce((a,g)=>a+Number(g.userReward||0),0))}</td><td><button type="button" class="btn blue" onclick="navigator.clipboard.writeText('${link}');toast('Link copied')">Copy</button> <button type="button" class="btn orange" onclick="editSmart('${l.id}')">Edit</button> <button type="button" class="btn red" onclick="delSmart('${l.id}')">Delete</button></td></tr>`}).join('')||'<tr><td colspan="4">No saved smart link</td></tr>'}
window.renderPage=()=>{if(!requireLogin())return;const pre=campaigns.find(x=>x.id===selected)||campaigns[0];shell('smart',`<div class="panel"><div class="toolbar" style="justify-content:space-between"><div><h2>My Smart Campaigns</h2><p class="muted">P1 worker payout set karo, profit auto calculate hoga.</p></div><button type="button" class="btn" onclick="openBuilder('${pre?.id||''}')">＋ Create New</button></div></div><div class="offers">${campaigns.map(c=>`<div class="offer"><div class="offerhead"><img src="${c.image||''}"><div><h3>${c.title||'Campaign'}</h3><p class="muted">Max payout ₹${money(totalMax(c))}</p></div><span class="tag green">ACTIVE</span></div><button type="button" class="btn full" onclick="openBuilder('${c.id}')">Create/Edit Split →</button></div>`).join('')||'<div class="empty">No campaigns</div>'}</div><div class="panel"><h2>Saved Smart Links</h2><div class="tablewrap"><table class="table"><thead><tr><th>Campaign</th><th>Link</th><th>Worker Total</th><th>Action</th></tr></thead><tbody id="smartRows">${renderRows()}</tbody></table></div></div>`)};
window.openBuilder=(id)=>{const c=campaigns.find(x=>x.id===id); if(!c)return; const goals=getGoals(c); modal(`<h2>New Campaign</h2><label class="mini">Campaign Title</label><input id="title" class="field" value="${c.title||''}"><label class="mini">Custom Slug</label><input id="slug" class="field" placeholder="mobilexpression-${Date.now().toString().slice(-4)}"><div class="panel"><h3>Payout Calculator</h3><label><input type="checkbox" id="p2"> Enable P2 Referral</label>${goals.map((g,i)=>`<div class="goalbox"><h3>${g.name} <span class="tag">Max Pay ₹${money(g.maxPayout)}</span></h3><label class="mini">Worker (P1)</label><input class="field split" data-max="${g.maxPayout}" data-name="${g.name}" value="${g.userReward||0}" type="number" min="0" max="${g.maxPayout}" oninput="calcProfit(this)"><div class="profitline">✅ Your Profit: ₹<span>${Math.max(0,g.maxPayout-g.userReward)}</span></div></div>`).join('')}</div><label class="mini">Worker Steps / Instructions</label><textarea id="steps" class="field" rows="5">${c.instructions||c.steps||''}</textarea><button type="button" class="btn full" onclick="saveSmart('${c.id}')">Create Campaign</button>`)};
window.calcProfit=(el)=>{let max=Number(el.dataset.max||0), val=Math.min(max,Number(el.value||0)); if(Number(el.value)>max){el.value=max;val=max} el.closest('.goalbox').querySelector('.profitline span').textContent=Math.max(0,max-val)};
window.saveSmart=async(id)=>{const c=campaigns.find(x=>x.id===id)||{}; const gs=[...document.querySelectorAll('.split')].map((el,i)=>({id:'g'+i,name:el.dataset.name,maxPayout:Number(el.dataset.max||0),userReward:Number(el.value||0),affiliateProfit:Math.max(0,Number(el.dataset.max||0)-Number(el.value||0))})); await addDoc(collection(db,'smart_links'),{campaignId:id,campaignTitle:title.value||c.title||'',publisherId:user.uid,slug:slug.value||('link-'+Date.now()),goals:gs,enableP2:p2.checked,steps:steps.value,createdAt:Date.now()}); closeModal(); await loadData(); document.getElementById('smartRows')&&(document.getElementById('smartRows').innerHTML=renderRows()); toast('Smart link created')};
window.editSmart=(id)=>{const l=smartLinks.find(x=>x.id===id); if(!l)return; const c=campaigns.find(x=>x.id===l.campaignId)||{}; modal(`<h2>Edit Smart Link</h2><input id="editSlug" class="field" value="${l.slug||''}">${(l.goals||getGoals(c)).map((g,i)=>`<div class="goalbox"><h3>${g.name} <span class="tag">Max ₹${money(g.maxPayout)}</span></h3><input class="field editSplit" data-max="${g.maxPayout}" data-name="${g.name}" value="${g.userReward||0}" type="number" oninput="calcProfit(this)"><div class="profitline">✅ Your Profit: ₹<span>${Math.max(0,Number(g.maxPayout||0)-Number(g.userReward||0))}</span></div></div>`).join('')}<button type="button" class="btn full" onclick="updateSmart('${id}')">Save Changes</button>`)};
window.updateSmart=async(id)=>{const gs=[...document.querySelectorAll('.editSplit')].map((el,i)=>({id:'g'+i,name:el.dataset.name,maxPayout:Number(el.dataset.max||0),userReward:Number(el.value||0),affiliateProfit:Math.max(0,Number(el.dataset.max||0)-Number(el.value||0))})); await updateDoc(doc(db,'smart_links',id),{slug:editSlug.value,goals:gs,updatedAt:Date.now()}); closeModal(); await loadData(); document.getElementById('smartRows').innerHTML=renderRows(); toast('Updated')};
window.delSmart=async(id)=>{if(!confirm('Delete smart link?'))return; await deleteDoc(doc(db,'smart_links',id)); const row=document.getElementById('row_'+id); if(row)row.remove(); await loadData(); document.getElementById('smartRows')&&(document.getElementById('smartRows').innerHTML=renderRows()); toast('Deleted')};
init();</script></body></html>
